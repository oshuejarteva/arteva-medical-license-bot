# ============================================================================
#  Medical License Bot — Конфигурация приложения
# ============================================================================
#
#  Все значения можно переопределить через переменные окружения.
#  Формат подстановки: ${ПЕРЕМЕННАЯ:значение_по_умолчанию}
#
# ============================================================================

# ────────────────────────────────────────────────────────────────────────────
#  Сервер
# ────────────────────────────────────────────────────────────────────────────
server:
  # Порт, на котором слушает HTTP-сервер (в Docker пробрасывается наружу)
  port: 8080
  # Плавное завершение — сервер дождётся завершения текущих запросов
  shutdown: graceful

spring:
  lifecycle:
    # Максимальное время ожидания при graceful shutdown (после чего — принудительное завершение)
    timeout-per-shutdown-phase: 30s

# ────────────────────────────────────────────────────────────────────────────
#  Безопасность REST API (Basic Auth)
# ────────────────────────────────────────────────────────────────────────────
#  Защищает административные эндпоинты (/reindex, /actuator/**)
#  Эндпоинт /ask — публичный, авторизация не требуется
api:
  admin:
    # Логин администратора
    username: ${API_ADMIN_USERNAME:admin}
    # Пароль администратора (обязателен в production!)
    password: ${API_ADMIN_PASSWORD}

# ────────────────────────────────────────────────────────────────────────────
#  Rate Limiting — ограничение частоты запросов
# ────────────────────────────────────────────────────────────────────────────
rate-limit:
  # Максимальное количество HTTP-запросов с одного IP в минуту
  # При превышении клиент получает 429 Too Many Requests
  requests-per-minute: ${RATE_LIMIT_RPM:30}

# ────────────────────────────────────────────────────────────────────────────
#  OpenRouter — LLM и Embedding-модели (OpenAI-совместимый API)
# ────────────────────────────────────────────────────────────────────────────
#  Документация: https://openrouter.ai/docs
openrouter:
  # API-ключ (обязателен). Получить: https://openrouter.ai/keys
  api-key: ${OPENROUTER_API_KEY}
  # Базовый URL API (обычно менять не нужно)
  base-url: ${OPENROUTER_BASE_URL:https://openrouter.ai/api/v1}
  # Модель для генерации ответов (чат-модель)
  # Примеры: google/gemini-2.0-flash-001, openai/gpt-4o-mini, anthropic/claude-3-haiku
  model: ${OPENROUTER_MODEL:google/gemini-2.0-flash-001}
  # Модель для генерации эмбеддингов (векторных представлений текста)
  # Размерность должна совпадать с qdrant.dimension
  embedding-model: ${OPENROUTER_EMBEDDING_MODEL:openai/text-embedding-3-small}
  # Температура генерации (0.0 — детерминированные ответы, 1.0 — творческие)
  # Для юридических документов рекомендуется низкая температура
  temperature: ${OPENROUTER_TEMPERATURE:0.1}

# ────────────────────────────────────────────────────────────────────────────
#  Qdrant — векторная база данных
# ────────────────────────────────────────────────────────────────────────────
#  Хранит эмбеддинги документов для семантического поиска
#  В docker-compose доступен по имени сервиса 'qdrant'
qdrant:
  # Хост Qdrant-сервера (в Docker — имя сервиса из docker-compose)
  host: ${QDRANT_HOST:localhost}
  # gRPC-порт Qdrant (6334 — стандартный gRPC-порт)
  port: ${QDRANT_PORT:6334}
  # Имя коллекции для хранения эмбеддингов документов
  collection-name: ${QDRANT_COLLECTION:medical-documents}
  # Размерность вектора (должна совпадать с embedding-model)
  # text-embedding-3-small → 1536, text-embedding-ada-002 → 1536
  dimension: ${QDRANT_DIMENSION:1536}

# ────────────────────────────────────────────────────────────────────────────
#  RAG — параметры поиска и извлечения
# ────────────────────────────────────────────────────────────────────────────
rag:
  # Сколько наиболее релевантных фрагментов извлекать из базы
  # Больше = больше контекста, но дороже и медленнее
  top-k: ${RAG_TOP_K:6}
  # Минимальный порог косинусного сходства (0.0–1.0)
  # Фрагменты с similarity < threshold отбрасываются
  # Выше = точнее, но может пропустить полезные фрагменты
  similarity-threshold: ${RAG_SIMILARITY_THRESHOLD:0.75}

# ────────────────────────────────────────────────────────────────────────────
#  Telegram Bot
# ────────────────────────────────────────────────────────────────────────────
telegram:
  # Токен бота (получить у @BotFather)
  token: ${TELEGRAM_TOKEN:}
  # Username бота (без @), должен совпадать с BotFather
  username: ${TELEGRAM_USERNAME:MedLicenseBot}
  # Включить/выключить Telegram-бота (при false — только REST API)
  enabled: ${TELEGRAM_ENABLED:true}
  # Список chat ID администраторов через запятую
  # Только эти пользователи могут выполнять /reindex в Telegram
  admin-chat-ids: ${TELEGRAM_ADMIN_CHAT_IDS:}

# ────────────────────────────────────────────────────────────────────────────
#  Общие параметры приложения
# ────────────────────────────────────────────────────────────────────────────
app:
  # Путь к папке с документами (DOC/DOCX) для индексации
  # Относительный — от корня проекта, абсолютный — от файловой системы
  docs-path: ${DOCS_PATH:./docs}
  # Модель токенизатора для разбиения текста на чанки
  # Должна соответствовать используемой embedding-модели
  tokenizer-model: ${TOKENIZER_MODEL:gpt-4o}

# ────────────────────────────────────────────────────────────────────────────
#  Actuator — мониторинг и метрики
# ────────────────────────────────────────────────────────────────────────────
management:
  endpoints:
    web:
      exposure:
        # Открытые эндпоинты (health и info — публичные, prometheus — для ADMIN)
        include: health,info,prometheus
  endpoint:
    health:
      # Не раскрывать детали подключений (безопасность)
      show-details: never
  metrics:
    tags:
      # Тег для всех метрик — помогает фильтровать в Grafana/Prometheus
      application: medical-license-bot

# ────────────────────────────────────────────────────────────────────────────
#  Логирование
# ────────────────────────────────────────────────────────────────────────────
#  В production рекомендуется использовать профиль json-logs
#  (активируется через SPRING_PROFILES_ACTIVE=json-logs)
logging:
  level:
    # Уровень корневого логгера
    root: INFO
    # Уровень приложения (DEBUG — для отладки RAG-пайплайна)
    com.arteva.medbot: INFO
    # Подавляем подробные логи библиотек
    dev.langchain4j: WARN
    io.qdrant: WARN

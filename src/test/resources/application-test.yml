# Test profile — disables Telegram and external services

telegram:
  enabled: false
  token: test-token
  username: TestBot
  admin-chat-ids:

openrouter:
  api-key: test-key
  base-url: https://localhost:9999
  model: test-model
  embedding-model: test-embedding
  temperature: 0.1

qdrant:
  host: localhost
  port: 6334
  collection-name: test-collection
  dimension: 1536

rag:
  top-k: 6
  similarity-threshold: 0.75

app:
  docs-path: ./docs
  tokenizer-model: gpt-4o

api:
  admin:
    username: admin
    password: test-password

rate-limit:
  requests-per-minute: 100

spring:
  security:
    enabled: false

logging:
  level:
    root: WARN

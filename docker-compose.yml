services:
  # ---- Qdrant Vector Store ----
  # NOTE: In production, remove 'ports' and use 'expose' to restrict Qdrant to internal network only
  qdrant:
    image: qdrant/qdrant:v1.12.1
    container_name: qdrant
    ports:
      - "6333:6333"   # REST API
      - "6334:6334"   # gRPC
    volumes:
      - qdrant_data:/qdrant/storage
    environment:
      QDRANT__SERVICE__GRPC_PORT: 6334
    mem_limit: 1g
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:6333/healthz || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ---- Application ----
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: medical-license-bot
    ports:
      - "8080:8080"
    environment:
      OPENROUTER_API_KEY: ${OPENROUTER_API_KEY}
      OPENROUTER_MODEL: ${OPENROUTER_MODEL:-google/gemini-2.0-flash-001}
      OPENROUTER_EMBEDDING_MODEL: ${OPENROUTER_EMBEDDING_MODEL:-openai/text-embedding-3-small}
      QDRANT_HOST: qdrant
      QDRANT_PORT: 6334
      TELEGRAM_TOKEN: ${TELEGRAM_TOKEN}
      TELEGRAM_USERNAME: ${TELEGRAM_USERNAME:-MedLicenseBot}
      TELEGRAM_ADMIN_CHAT_IDS: ${TELEGRAM_ADMIN_CHAT_IDS:-}
      API_ADMIN_PASSWORD: ${API_ADMIN_PASSWORD}
      API_ADMIN_USERNAME: ${API_ADMIN_USERNAME:-admin}
      RATE_LIMIT_RPM: ${RATE_LIMIT_RPM:-30}
      SPRING_PROFILES_ACTIVE: json-logs
      DOCS_PATH: /app/docs
    volumes:
      - ./docs:/app/docs:ro
    mem_limit: 2g
    depends_on:
      qdrant:
        condition: service_healthy
    restart: unless-stopped

volumes:
  qdrant_data:
